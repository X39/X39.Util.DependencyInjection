
name: NuGet package publish
on:
  push:
    branches: [ master ]
  workflow_dispatch:
jobs:
  upload-to-npgk:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build --no-restore
    - name: Test
      run: dotnet test --no-build --verbosity normal
    - name: Pack
      # CHANGE PACKAGE VERSION - The retarded way
      # Change the /p:VERSION=X.X.X part to change the actual package version.
      run: dotnet pack --configuration Release /p:VERSION=3.0.0.${{ github.run_number }} --version-suffix ${{ github.sha }}
    - name: Upload to NuGet
      run: dotnet nuget push sources/X39.Util.DependencyInjection/bin/Release/X39.Util.DependencyInjection.*.nupkg -s https://api.nuget.org/v3/index.json -k ${{ secrets.NUGET_API_KEY }}
